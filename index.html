<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ÜNVAN DEĞİŞİKLİĞİ ÖRNEK SORULAR</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .header, .bottom-warning, .frame-wrap, .toolbar, .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.07);
      border: 1px solid #e5e7eb;
    }
    .header {
      padding: 22px 18px;
      margin-bottom: 18px;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      line-height: 1.25;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
    }
    .card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 220px;
      position: relative;
    }
    .card.locked {
      opacity: 0.82;
      border-color: #d1d5db;
    }
    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      min-height: 48px;
      padding-right: 70px;
    }
    .lock-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      display: none;
    }
    .card.locked .lock-badge { display: inline-block; }
    .stats-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      min-height: 98px;
    }
    .stats-line { font-size: 14px; color: #374151; line-height: 1.65; margin: 2px 0; }
    .stats-line strong { color: #111827; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      transition: .2s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .btn-unlock { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    
    .hidden-while-viewing { display: block; }
    body.viewing .hidden-while-viewing { display: none !important; }
    body.viewing .wrap { padding: 0; max-width: 100%; }

    /* YENİ SİSTEM: UYGULAMA GİBİ TAM EKRAN İZLEYİCİ */
    .viewer { display: none; }
    
    body.viewing {
      overflow: hidden; /* Ana sayfanın arkada kaymasını tamamen engeller */
    }
    
    body.viewing .viewer {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh; /* Fallback */
      height: 100dvh; /* Modern mobil tarayıcılar için adres çubuğu uyumluluğu */
      background: #fff;
      z-index: 9999;
    }

    body.viewing .toolbar {
      flex: 0 0 auto; /* Toolbar boyutu sabit kalır */
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin: 0;
      border-radius: 0;
    }

    body.viewing .toolbar .btn {
      padding: 10px 16px;
      font-size: 15px;
      background: #2563eb; /* Mavi Buton */
    }

    body.viewing .current-title {
      font-weight: 700;
      font-size: 16px;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; /* Başlık çok uzunsa sonuna ... koyar */
    }

    body.viewing .frame-wrap {
      flex: 1 1 auto; /* Kalan tüm boşluğu iframe kaplar */
      padding: 0;
      margin: 0;
      border-radius: 0;
      border: none;
      box-shadow: none;
      -webkit-overflow-scrolling: touch;
    }

    body.viewing iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      display: block;
    }

    .bottom-warning {
      margin-top: 18px;
      padding: 18px;
      line-height: 1.65;
      color: #374151;
      text-align: center;
    }
    .bottom-warning strong {
      color: #111827;
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .wrap { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .btn { width: 100%; font-size: 16px; padding: 14px; }
      
      /* Mobilde başlığı gizleyip butona yer açıyoruz */
      body.viewing .current-title { display: none; } 
      body.viewing .toolbar .btn { width: 100%; } /* Buton menüyü kaplar */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar hidden-while-viewing" id="topBar">
      <button class="btn btn-danger" style="width: auto;" onclick="resetDashboardStats()">Ana Sayfa Verilerini Sıfırla</button>
