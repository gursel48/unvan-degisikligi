<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ÜNVAN DEĞİŞİKLİĞİ ÖRNEK SORULAR</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .header, .bottom-warning, .frame-wrap, .toolbar, .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.07);
      border: 1px solid #e5e7eb;
    }
    .header {
      padding: 22px 18px;
      margin-bottom: 18px;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      line-height: 1.25;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
    }
    .card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 220px;
      position: relative;
    }
    .card.locked {
      opacity: 0.82;
      border-color: #d1d5db;
    }
    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      min-height: 48px;
      padding-right: 70px;
    }
    .lock-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      display: none;
    }
    .card.locked .lock-badge { display: inline-block; }
    .stats-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      min-height: 98px;
    }
    .stats-line { font-size: 14px; color: #374151; line-height: 1.65; margin: 2px 0; }
    .stats-line strong { color: #111827; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      transition: .2s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .btn-unlock { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    
    .hidden-while-viewing { display: block; }
    body.viewing .hidden-while-viewing { display: none !important; }
    body.viewing .wrap { padding: 0; max-width: 100%; }

    /* YENİ SİSTEM: UYGULAMA GİBİ TAM EKRAN İZLEYİCİ */
    .viewer { display: none; }
    
    body.viewing {
      overflow: hidden; /* Ana sayfanın arkada kaymasını tamamen engeller */
    }
    
    body.viewing .viewer {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh; /* Fallback */
      height: 100dvh; /* Modern mobil tarayıcılar için adres çubuğu uyumluluğu */
      background: #fff;
      z-index: 9999;
    }

    body.viewing .toolbar {
      flex: 0 0 auto; /* Toolbar boyutu sabit kalır */
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin: 0;
      border-radius: 0;
    }

    body.viewing .toolbar .btn {
      padding: 10px 16px;
      font-size: 15px;
      background: #2563eb; /* Mavi Buton */
    }

    body.viewing .current-title {
      font-weight: 700;
      font-size: 16px;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; /* Başlık çok uzunsa sonuna ... koyar */
    }

    body.viewing .frame-wrap {
      flex: 1 1 auto; /* Kalan tüm boşluğu iframe kaplar */
      padding: 0;
      margin: 0;
      border-radius: 0;
      border: none;
      box-shadow: none;
      -webkit-overflow-scrolling: touch;
    }

    body.viewing iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      display: block;
    }

    .bottom-warning {
      margin-top: 18px;
      padding: 18px;
      line-height: 1.65;
      color: #374151;
      text-align: center;
    }
    .bottom-warning strong {
      color: #111827;
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .wrap { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .btn { width: 100%; font-size: 16px; padding: 14px; }
      
      /* Mobilde başlığı gizleyip butona yer açıyoruz */
      body.viewing .current-title { display: none; } 
      body.viewing .toolbar .btn { width: 100%; } /* Buton menüyü kaplar */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar hidden-while-viewing" id="topBar">
      <button class="btn btn-danger" style="width: auto;" onclick="resetDashboardStats()">Ana Sayfa Verilerini Sıfırla</button>
    </div>

    <div class="header hidden-while-viewing" id="topHeader">
      <h1>ÜNVAN DEĞİŞİKLİĞİ ÖRNEK SORULAR</h1>
    </div>

    <section id="menuView">
      <div class="grid" id="linkGrid"></div>
    </section>

    <section id="viewer" class="viewer">
      <div class="toolbar">
        <button class="btn btn-primary" onclick="goHome()">← Ana Sayfaya Dön</button>
        <div class="current-title" id="currentTitle">Seçili Sayfa</div>
      </div>

      <div class="frame-wrap">
        <iframe id="contentFrame" src="" title="İçerik Alanı"></iframe>
      </div>
    </section>

    <div class="bottom-warning hidden-while-viewing" id="bottomWarning">
      <strong>⚠️ Önemli Uyarı</strong>
      Bu sistemde yer alan içerikler yalnızca eğitim amaçlıdır. İçeriklerin kullanımından doğabilecek doğrudan veya dolaylı hiçbir sorumluluk kabul edilmez. Tüm kullanım sorumluluğu kullanıcıya aittir. Sorular Örnektir. <strong style="display:inline; font-size:inherit; margin:0; color:#2563eb;">Başarılar Dileriz!</strong>
    </div>
  </div>

  <script>
    const links = [
      { id: "balik-besleme", title: "Balık Besleme ve Yem Teknolojisi", url: "https://gursel48.github.io/balik-besleme-ve-yem-teknolojisi/" },
      { id: "mevzuat", title: "Su Ürünleri Mevzuat ve Yönetmelik", url: "https://gursel48.github.io/Su-Urunleri-Mevzuat-ve-Yonetmelik/" },
      { id: "balik-hastaliklari", title: "Balık Hastalıkları", url: "https://gursel48.github.io/balik-hastaliklari/" },
      { id: "ekonomi", title: "Su Ürünleri Ekonomisi", url: "https://gursel48.github.io/Su-Urunleri-Ekonomisi/" },
      { id: "hijyen", title: "Su Ürünlerinde Hijyen ve Kalite Kontrolü", url: "https://gursel48.github.io/Su-urunlerinde-Hijyen-ve-Kalite-Kontrolu/" },
      { id: "su-kirliligi", title: "Su Kirliliği ve Kontrolü", url: "https://gursel48.github.io/Su-Kirliligi-ve-Kontrolu/" },
      { id: "su-kalitesi", title: "Su Kalitesi", url: "https://gursel48.github.io/Su-Kalitesi/" },
      { id: "ornek-sorular", title: "Örnek Sorular GYS Merkezi", url: "https://gursel48.github.io/ornek-sorular-gysmerkezi/" },
      { id: "konular", title: "GYS Merkezi Konular", url: "https://gursel48.github.io/gysmerkezi-konular/" },
      { id: "gemini-600", title: "Gemini 600", url: "https://gursel48.github.io/gemini-600/" },
      { id: "chatgbt600", title: "ChatGBT 600 Soru", url: "https://gursel48.github.io/chatgbt600-soru/" },
      { id: "balik-boy", title: "Mevzuat Balık Boy", url: "https://gursel48.github.io/mevzuat-balik-boy/" }
    ];

    const DASH_KEY = "dashboard_stats_v7";
    const BRIDGE_ID = "__gys_parent_bridge__";
    const linkGrid = document.getElementById("linkGrid");
    const menuView = document.getElementById("menuView");
    const viewer = document.getElementById("viewer");
    const frame = document.getElementById("contentFrame");
    const currentTitle = document.getElementById("currentTitle");

    let activeItem = null;
    let injectRetryTimer = null;

    function safeNum(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function defaultStats() {
      return { total: 0, solved: 0, correct: 0, wrong: 0, locked: false };
    }

    function getDashboardStats() {
      try { return JSON.parse(localStorage.getItem(DASH_KEY) || "{}"); } catch (e) { return {}; }
    }

    function saveDashboardStats(obj) {
      localStorage.setItem(DASH_KEY, JSON.stringify(obj));
    }

    function getCardStats(id) {
      return getDashboardStats()[id] || defaultStats();
    }

    function normalizeStats(stats) {
      const total = safeNum(stats.total);
      const solved = safeNum(stats.solved);
      const correct = safeNum(stats.correct);
      const wrong = safeNum(stats.wrong);
      const locked = !!stats.locked || (total > 0 && solved >= total);
      return { total, solved, correct, wrong, locked };
    }

    function setCardStats(id, stats) {
      const all = getDashboardStats();
      all[id] = normalizeStats(stats);
      saveDashboardStats(all);
      renderLinks();
    }

    function getSortedLinks() {
      return [...links].sort((a, b) => {
        const sa = getCardStats(a.id);
        const sb = getCardStats(b.id);
        if (sa.locked !== sb.locked) return sa.locked ? 1 : -1;
        return links.findIndex(x => x.id === a.id) - links.findIndex(x => x.id === b.id);
      });
    }

    function renderLinks() {
      linkGrid.innerHTML = "";
      const ordered = getSortedLinks();

      ordered.forEach((item) => {
        const originalIndex = links.findIndex(x => x.id === item.id) + 1;
        const stats = normalizeStats(getCardStats(item.id));
        const card = document.createElement("div");
        card.className = "card" + (stats.locked ? " locked" : "");

        card.innerHTML = `
          <div class="lock-badge">🔒 Kilitli</div>
          <h3>${originalIndex}. ${item.title}</h3>
          <div class="stats-box">
            <div class="stats-line"><strong>Toplam Soru Sayısı:</strong> ${stats.total || '-'}</div>
          </div>
          <div class="btn-row">
            ${stats.locked
              ? `<button class="btn btn-unlock" type="button" onclick="unlockCard('${item.id}')">Kilit Aç</button>`
              : `<button class="btn btn-primary" type="button" onclick="openPage('${item.id}')">Sınava Başla</button>`}
          </div>
        `;
        linkGrid.appendChild(card);
      });
    }

    function openPage(id) {
      const item = links.find(x => x.id === id);
      if (!item) return;

      const stats = getCardStats(id);
      if (stats.locked) return;

      activeItem = item;
      currentTitle.textContent = item.title;
      frame.src = item.url;
      menuView.style.display = "none";
      document.body.classList.add("viewing"); // Fixed header sistemini devreye sokar
      window.scrollTo(0, 0);
    }

    function goHome() {
      stopRetry();
      frame.src = "";
      document.body.classList.remove("viewing");
      menuView.style.display = "block";
      renderLinks();
      window.scrollTo(0, 0);
    }

    function unlockCard(id) {
      const stats = getCardStats(id);
      setCardStats(id, { ...stats, locked: false });
    }

    function resetDashboardStats() {
      if (!confirm("Ana sayfadaki tüm istatistik verileri sıfırlansın mı?")) return;
      localStorage.removeItem(DASH_KEY);
      renderLinks();
    }

    function stopRetry() {
      if (injectRetryTimer) {
        clearTimeout(injectRetryTimer);
        injectRetryTimer = null;
      }
    }

    function injectBridge() {
      stopRetry();
      if (!activeItem) return;

      try {
        const doc = frame.contentDocument;
        const win = frame.contentWindow;
        if (!doc || !win) {
          injectRetryTimer = setTimeout(injectBridge, 1200);
          return;
        }

        if (doc.getElementById(BRIDGE_ID)) {
          try { win.__gysSendStats && win.__gysSendStats(); } catch (e) {}
          return;
        }

        const script = doc.createElement("script");
        script.id = BRIDGE_ID;
        script.textContent = `
          (function() {
            function n(v) { var x = Number(v); return Number.isFinite(x) ? x : 0; }
            function textFrom(el) { return el ? (el.innerText || el.textContent || "").replace(/\\s+/g, " ").trim() : ""; }
            function sumFromLikelyButtons() {
              var total = 0, seen = {};
              var selectors = ["button", ".set-btn", ".menu-btn", ".exam-btn", ".quiz-btn", ".card", ".set-card", ".menu-card", "[onclick]", "[role='button']", "a"];
              selectors.forEach(function(sel) {
                try {
                  document.querySelectorAll(sel).forEach(function(el) {
                    var txt = textFrom(el);
                    if (!txt || !/deneme|set|soru/i.test(txt)) return;
                    var m = txt.match(/(\\d+)\\s*Soru\\b/i);
                    if (!m) return;
                    var key = txt + "::" + m[1];
                    if (seen[key]) return;
                    seen[key] = true;
                    total += n(m[1]);
                  });
                } catch (e) {}
              });
              return total;
            }
            function sumFromStructuredMenu() {
              var total = 0;
              try {
                var seen = {};
                var nodes = Array.from(document.querySelectorAll("button, div, a, span, h1, h2, h3, h4"));
                var denemeNodes = nodes.filter(function(el) {
                  var t = textFrom(el);
                  return /^deneme\\s*-?\\s*\\d+/i.test(t) || /^set\\s*-?\\s*\\d+/i.test(t);
                });
                denemeNodes.forEach(function(node) {
                  var scope = node.closest("button, a, .card, .set-card, .menu-card, div") || node.parentElement || node;
                  var txt = textFrom(scope);
                  if (!txt || !/soru/i.test(txt)) txt = textFrom(node.parentElement) + " " + textFrom(node.nextElementSibling);
                  var m = txt.match(/(\\d+)\\s*Soru\\b/i);
                  if (!m) return;
                  var key = txt + "::" + m[1];
                  if (seen[key]) return;
                  seen[key] = true;
                  total += n(m[1]);
                });
              } catch (e) {}
              return total;
            }
            function sumQuestionCounts() {
              var total = sumFromLikelyButtons();
              if (total) return total;
              total = sumFromStructuredMenu();
              if (total) return total;
              try { if (typeof questions !== "undefined" && Array.isArray(questions)) return questions.length; } catch (e) {}
              return 0;
            }
            function readStats() {
              var total = sumQuestionCounts(), solved = 0, correct = 0, wrong = 0;
              try { if (typeof userAnswers !== "undefined" && userAnswers && typeof userAnswers === "object") solved = Object.keys(userAnswers).length; } catch (e) {}
              try { if (typeof stats !== "undefined" && stats && typeof stats === "object") { correct = n(stats.correct); wrong = n(stats.wrong); } } catch (e) {}
              try {
                for (var i = 0; i < localStorage.length; i++) {
                  var key = localStorage.key(i);
                  if (!key) continue;
                  if (key.indexOf("state_set_") === 0 || key.indexOf("quiz_state") >= 0 || key.indexOf("currentSet") >= 0) {
                    var raw = localStorage.getItem(key);
                    if (!raw) continue;
                    var data = null;
                    try { data = JSON.parse(raw); } catch (e) { data = null; }
                    if (!data) continue;
                    if (data.userAnswers && typeof data.userAnswers === "object") solved = Math.max(solved, Object.keys(data.userAnswers).length);
                    if (data.stats && typeof data.stats === "object") { correct = Math.max(correct, n(data.stats.correct)); wrong = Math.max(wrong, n(data.stats.wrong)); }
                  }
                }
              } catch (e) {}
              parent.postMessage({ type: "gys-stats", href: location.href, total: total, solved: solved, correct: correct, wrong: wrong }, "*");
            }
            window.__gysSendStats = readStats;
            window.__gysSendStats();
            setInterval(window.__gysSendStats, 1200);
          })();
        `;
        doc.documentElement.appendChild(script);
        setTimeout(() => { try { win.__gysSendStats && win.__gysSendStats(); } catch (e) {} }, 400);
      } catch (e) {
        injectRetryTimer = setTimeout(injectBridge, 1500);
      }
    }

    window.addEventListener("message", function(event) {
      if (!activeItem) return;
      if (!event.data || event.data.type !== "gys-stats") return;

      const id = activeItem.id;
      const old = normalizeStats(getCardStats(id));
      const d = event.data;

      const next = normalizeStats({
        total: d.total || old.total,
        solved: safeNum(d.solved),
        correct: safeNum(d.correct),
        wrong: safeNum(d.wrong),
        locked: old.locked
      });

      if (next.total > 0 && next.solved >= next.total) {
        next.locked = true;
      }

      setCardStats(id, next);
    });

    frame.addEventListener("load", function() {
      if (!activeItem) return;
      setTimeout(injectBridge, 700);
      setTimeout(injectBridge, 1800);
      setTimeout(injectBridge, 3200);
    });

    renderLinks();
  </script>
</body>
</html>
